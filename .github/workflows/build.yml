name: Build Signed Nexus Browser APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease

      - name: Generate keystore and sign APK
        run: |
          # Generate a debug keystore (for signing)
          keytool -genkey -v -keystore my-release-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias my-key-alias -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, ST=Unknown, C=Unknown" -storepass nexus123 -keypass nexus123
          # Sign the APK
          apksigner sign --ks my-release-key.jks --ks-pass pass:nexus123 --key-pass pass:nexus123 --out app-release-signed.apk app/build/outputs/apk/lightningPlus/release/app-lightningPlus-release-unsigned.apk || \
          apksigner sign --ks my-release-key.jks --ks-pass pass:nexus123 --key-pass pass:nexus123 --out app-release-signed.apk app/build/outputs/apk/*/release/*.apk

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: nexus-browser-signed
          path: app-release-signed.apk
